<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Firmas por hexágono H3</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />

<link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3/dist/pmtiles.js"></script>

<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, sans-serif; }
  #map { position: absolute; top: 0; bottom: 0; width: 100%; }

  #controls {
    position: absolute;
    top: 12px;
    left: 12px;
    z-index: 1;
    background: white;
    padding: 10px 14px;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    font-size: 14px;
  }
  #controls label { display: block; margin-bottom: 4px; margin-top: 8px; font-weight: 600; }
  #controls label:first-child { margin-top: 0; }
  #controls select { font-size: 14px; padding: 4px; width: 100%; }

  #legend {
    position: absolute;
    bottom: 24px;
    left: 12px;
    z-index: 1;
    background: white;
    padding: 10px 14px;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    font-size: 13px;
  }
  #legend .title { font-weight: 600; margin-bottom: 6px; }
  #legend .ramp {
    width: 200px;
    height: 12px;
    background: linear-gradient(to right, #440154, #3b528b, #21908d, #5dc863, #fde725);
    border-radius: 2px;
  }
  #legend .labels {
    display: flex;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 11px;
    color: #444;
  }

  .maplibregl-popup-content {
    font-size: 13px;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="controls">
  <label for="ano-select">Ano</label>
  <select id="ano-select"></select>

  <label for="variavel-select">Variável</label>
  <select id="variavel-select"></select>
</div>

<div id="legend">
  <div class="title" id="legend-title"></div>
  <div class="ramp" id="legend-ramp"></div>
  <div class="labels" id="legend-labels"></div>
</div>

<script>
// ------------------------------------------------------------------
// CONFIGURAÇÃO — ajuste estes valores conforme seus dados
// ------------------------------------------------------------------
const PMTILES_URL = "hex.pmtiles";   // caminho relativo ao próprio HTML
const ANOS = [2022, 2023];           // anos disponíveis no filtro
const ANO_INICIAL = 2023;

const RESOLUCOES = [
  { res: 4, minzoom: 0,  maxzoom: 6  },
  { res: 6, minzoom: 6,  maxzoom: 9  },
  { res: 8, minzoom: 9,  maxzoom: 14 }
];

// paleta viridis (5 cores) reutilizada para todas as variáveis
const CORES = ["#440154", "#3b528b", "#21908d", "#5dc863", "#fde725"];

// uma variável por coluna disponível — breaks calculados via
// quantile(hex_res6$F001, c(0,.25,.5,.75,1)) / quantile(hex_res6$T001, ...) no R
const VARIAVEIS = {
  F001: { label: "Quantidade de firmas (F001)", values: [0, 11, 44, 220, 17001] },
  T001: { label: "Quantidade de trabalhadores (T001)", values: [0, 60, 380, 3256, 755655] }
};
const VARIAVEL_INICIAL = "F001";

// distribuição muito assimétrica (cauda longa) — interpolação em escala
// log10(x + 1) evita que os outliers dominem a paleta inteira
function buildFillColorExpr(coluna) {
  const values = VARIAVEIS[coluna].values;
  const expr = ["interpolate", ["linear"], ["log10", ["+", ["to-number", ["get", coluna]], 1]]];
  values.forEach((v, i) => { expr.push(Math.log10(v + 1), CORES[i]); });
  return expr;
}

function layerId(res) {
  return `fill-h3-r${String(res).padStart(2, "0")}`;
}
// ------------------------------------------------------------------

let protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      basemap: {
        type: "raster",
        tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"],
        tileSize: 256,
        attribution: "&copy; OpenStreetMap contributors"
      }
    },
    layers: [{ id: "basemap", type: "raster", source: "basemap" }]
  },
  center: [-51, -15],   // ajuste para o centro dos seus dados
  zoom: 4
});

map.addControl(new maplibregl.NavigationControl(), "top-right");

map.on("load", () => {
  map.addSource("hex", {
    type: "vector",
    url: "pmtiles://" + PMTILES_URL
  });

  RESOLUCOES.forEach(info => {
    const id = layerId(info.res);
    map.addLayer({
      id: id,
      type: "fill",
      source: "hex",
      "source-layer": `h3_r${String(info.res).padStart(2, "0")}`,
      minzoom: info.minzoom,
      maxzoom: info.maxzoom,
      filter: ["==", ["to-number", ["get", "year"]], ANO_INICIAL],
      paint: {
        "fill-color": buildFillColorExpr(VARIAVEL_INICIAL),
        "fill-opacity": 0.85,
        "fill-outline-color": "rgba(255,255,255,0.3)"
      }
    });

    // popup ao clicar
    map.on("click", id, (e) => {
      const props = e.features[0].properties;
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(
          `F001: ${props.F001}<br>T001: ${props.T001}<br>Ano: ${props.year}`
        )
        .addTo(map);
    });

    map.on("mouseenter", id, () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", id, () => { map.getCanvas().style.cursor = ""; });
  });

  atualizarLegenda(VARIAVEL_INICIAL);
});

// ------------------------------------------------------------------
// Legenda dinâmica — reflete a variável ativa
// ------------------------------------------------------------------
function formatarNumero(v) {
  if (v >= 1000) return (v / 1000).toFixed(v >= 10000 ? 0 : 1) + "k";
  return String(v);
}

function atualizarLegenda(coluna) {
  const info = VARIAVEIS[coluna];
  document.getElementById("legend-title").textContent = info.label;
  document.getElementById("legend-ramp").style.background =
    `linear-gradient(to right, ${CORES.join(", ")})`;
  document.getElementById("legend-labels").innerHTML =
    info.values.map(v => `<span>${formatarNumero(v)}</span>`).join("");
}

// ------------------------------------------------------------------
// Seletor de ano
// ------------------------------------------------------------------
const selectAno = document.getElementById("ano-select");
ANOS.forEach(ano => {
  const opt = document.createElement("option");
  opt.value = ano;
  opt.textContent = ano;
  if (ano === ANO_INICIAL) opt.selected = true;
  selectAno.appendChild(opt);
});

selectAno.addEventListener("change", () => {
  const anoSelecionado = parseInt(selectAno.value, 10);
  RESOLUCOES.forEach(info => {
    map.setFilter(
      layerId(info.res),
      ["==", ["to-number", ["get", "year"]], anoSelecionado]
    );
  });
});

// ------------------------------------------------------------------
// Seletor de variável (F001 / T001)
// ------------------------------------------------------------------
const selectVariavel = document.getElementById("variavel-select");
Object.keys(VARIAVEIS).forEach(coluna => {
  const opt = document.createElement("option");
  opt.value = coluna;
  opt.textContent = VARIAVEIS[coluna].label;
  if (coluna === VARIAVEL_INICIAL) opt.selected = true;
  selectVariavel.appendChild(opt);
});

selectVariavel.addEventListener("change", () => {
  const coluna = selectVariavel.value;
  const expr = buildFillColorExpr(coluna);
  RESOLUCOES.forEach(info => {
    map.setPaintProperty(layerId(info.res), "fill-color", expr);
  });
  atualizarLegenda(coluna);
});
</script>

</body>
</html>
